# Example: create a Kubernetes secret for pulling images from GHCR.
# Replace <BASE64_ENCODED_DOCKER_CONFIG> with the base64-encoded content of
# your Docker config JSON (~/.docker/config.json after docker login).
#
# Generate it with:
#   kubectl create secret docker-registry ghcr-credentials \
#     --docker-server=ghcr.io \
#     --docker-username=<GITHUB_USERNAME> \
#     --docker-password=<GITHUB_TOKEN> \
#     --namespace=production \
#     --dry-run=client -o yaml
#
# Or manually:
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: ghcr-credentials
#   namespace: production
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
#
# After creating the secret, reference it in your Deployment under
# spec.template.spec.imagePullSecrets:
#
#   imagePullSecrets:
#     - name: ghcr-credentials
#
# TLS secret for Ingress (used by k8s/ingress.yaml as app-tls-secret):
# Either provision via cert-manager or manually:
#
#   kubectl create secret tls app-tls-secret \
#     --cert=path/to/tls.crt \
#     --key=path/to/tls.key \
#     --namespace=production
